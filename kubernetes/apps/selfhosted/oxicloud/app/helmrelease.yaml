---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oxicloud
spec:
  chartRef:
    kind: OCIRepository
    name: oxicloud
  interval: 1h
  values:
    controllers:
      oxicloud:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          01-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18
            envFrom: &envFrom
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
        containers:
          app:
            image:
              repository: diocrafts/oxicloud
              tag: 0.6.0@sha256:d0b9fc61b8aec147526992d92a5189025e95c1adde482244d6ccfe39ffdf3c80
            env:
              OXICLOUD_BASE_URL: "https://files.rodent.cc"
              OXICLOUD_OIDC_ADMIN_GROUPS: "admins"
              OXICLOUD_OIDC_ENABLED: "true"
              OXICLOUD_OIDC_PROVIDER_NAME: "Pocket ID"
              OXICLOUD_SERVER_PORT: &port 8086
              OXICLOUD_STORAGE_BACKEND: "s3"
              OXICLOUD_STORAGE_CACHE_ENABLED: "true"
              OXICLOUD_S3_REGION: "auto"
              OXICLOUD_S3_FORCE_PATH_STYLE: "true"
              OXICLOUD_STORAGE_ENCRYPTION_ENABLED: "true"
            envFrom: *envFrom
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "files.rodent.cc"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      storage:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /app/storage
      tmp:
        type: emptyDir
